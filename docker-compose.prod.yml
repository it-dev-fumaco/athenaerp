services:
  app:
    image: ${ATHENAERP_APP_IMAGE:-athenaerp-app-fpm:latest}
    build:
      context: .
      dockerfile: Dockerfile.fpm
      args:
        COMPOSER_INSTALL_FLAGS: "--no-dev"
        XDEBUG_ENABLED: "0"
        OPCACHE_REVALIDATE_FREQ: "0"
        OPCACHE_VALIDATE_TIMESTAMPS: "0"
    container_name: athenaerp-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DEBUGBAR_ENABLED: "false"
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      TYPESENSE_ENABLED: ${TYPESENSE_ENABLED:-false}
      TYPESENSE_HOST: ${TYPESENSE_HOST:-typesense}
      TYPESENSE_PORT: ${TYPESENSE_PORT:-8108}
      TYPESENSE_PROTOCOL: ${TYPESENSE_PROTOCOL:-http}
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-}
      TYPESENSE_COLLECTION: ${TYPESENSE_COLLECTION:-items}
    volumes:
      - athenaerp-storage:/var/www/html/storage
    depends_on:
      redis:
        condition: service_started
    networks:
      - athenaerp

  nginx:
    image: ${ATHENAERP_NGINX_IMAGE:-athenaerp-nginx:latest}
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      args:
        APP_IMAGE: ${ATHENAERP_APP_IMAGE:-athenaerp-app-fpm:latest}
        ESSEX_APP_IMAGE: ${ESSEX_APP_IMAGE:-devfumaco/essex-app:essexV4}
    container_name: athenaerp-nginx
    restart: unless-stopped
    ports:
      - "${FORWARD_HTTP_PORT:-80}:80"
    depends_on:
      - app
    networks:
      - athenaerp

  queue:
    image: ${ATHENAERP_APP_IMAGE:-athenaerp-app-fpm:latest}
    container_name: athenaerp-queue
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DEBUGBAR_ENABLED: "false"
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      TYPESENSE_ENABLED: ${TYPESENSE_ENABLED:-false}
      TYPESENSE_HOST: ${TYPESENSE_HOST:-typesense}
      TYPESENSE_PORT: ${TYPESENSE_PORT:-8108}
      TYPESENSE_PROTOCOL: ${TYPESENSE_PROTOCOL:-http}
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-}
      TYPESENSE_COLLECTION: ${TYPESENSE_COLLECTION:-items}
    command: ["php", "artisan", "queue:work", "--force", "--sleep=3", "--tries=3", "--timeout=120"]
    volumes:
      - athenaerp-storage:/var/www/html/storage
    depends_on:
      - app
      - redis
    networks:
      - athenaerp

  scheduler:
    image: ${ATHENAERP_APP_IMAGE:-athenaerp-app-fpm:latest}
    container_name: athenaerp-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DEBUGBAR_ENABLED: "false"
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      TYPESENSE_ENABLED: ${TYPESENSE_ENABLED:-false}
      TYPESENSE_HOST: ${TYPESENSE_HOST:-typesense}
      TYPESENSE_PORT: ${TYPESENSE_PORT:-8108}
      TYPESENSE_PROTOCOL: ${TYPESENSE_PROTOCOL:-http}
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-}
      TYPESENSE_COLLECTION: ${TYPESENSE_COLLECTION:-items}
    command: ["php", "artisan", "schedule:work", "--no-interaction"]
    volumes:
      - athenaerp-storage:/var/www/html/storage
    depends_on:
      - app
      - redis
    networks:
      - athenaerp

  redis:
    image: redis:7-alpine
    container_name: athenaerp-redis
    restart: unless-stopped
    volumes:
      - athenaerp-redis:/data
    networks:
      - athenaerp

  typesense:
    image: typesense/typesense:26.0
    container_name: athenaerp-typesense
    restart: unless-stopped
    environment:
      TYPESENSE_DATA_DIR: /data
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY:-}
      TYPESENSE_ENABLE_CORS: "true"
    volumes:
      - athenaerp-typesense:/data
    networks:
      - athenaerp

networks:
  athenaerp:
    driver: bridge

volumes:
  athenaerp-storage:
  athenaerp-redis:
  athenaerp-typesense:
