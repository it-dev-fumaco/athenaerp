# AthenaERP - Docker Compose
# Copy .env.example to .env and set DB_* / APP_URL before running.
#
# Performance: give Docker more RAM (Docker Desktop → Settings → Resources, e.g. 4–8 GB).
# For production-like speed set in .env: APP_ENV=production, APP_DEBUG=false, XDEBUG_ENABLED=0.
# Optional: use Nginx + PHP-FPM for concurrent requests: see readme "Performance" and docker-compose.fpm.yml.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        COMPOSER_INSTALL_FLAGS: "--no-dev"
        # Set to 0 in .env for production-like performance (disables Xdebug)
        XDEBUG_ENABLED: ${XDEBUG_ENABLED:-1}
    image: athenaerp-app
    container_name: athenaerp-app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - .:/var/www/html:delegated
    # Host :80 is often taken on Windows (IIS, other stacks). Use 8080 or set FORWARD_APP_PORT in .env.
    ports:
      - "${FORWARD_APP_PORT:-8080}:8000"
    # Optional: limit CPU/memory (uncomment and adjust). Prefer giving Docker more resources in Desktop.
    # deploy:
    #   resources:
    #     limits: { memory: 1G }
    #     reservations: { memory: 512M }
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      DEBUGBAR_ENABLED: ${DEBUGBAR_ENABLED:-false}
      APP_URL: ${APP_URL:-http://AthenaERP.local}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-laravel}
      # In Docker we use laravel user (MySQL creates it; root is not allowed as MYSQL_USER)
      DB_USERNAME: laravel
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      DB_HOST_1: mysql_mes
      DB_PORT_1: 3306
      DB_DATABASE_1: ${DB_DATABASE_1:-}
      DB_USERNAME_1: laravel
      DB_PASSWORD_1: ${DB_PASSWORD_1:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-sync}
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_USERNAME: null
      MAIL_PASSWORD: null
      MAIL_ENCRYPTION: null
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - athenaerp

  mysql:
    image: mysql:8.2
    container_name: athenaerp-mysql
    restart: unless-stopped
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      # MySQL image forbids MYSQL_USER=root; always create a non-root app user
      MYSQL_USER: laravel
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - athenaerp-mysql:/var/lib/mysql
      - ./docker/mysql/conf.d/99-performance.cnf:/etc/mysql/conf.d/99-performance.cnf:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\""]
      retries: 10
      interval: 5s
      timeout: 5s
      start_period: 30s
    networks:
      - athenaerp

  # Optional: second MySQL for MES (mysql_mes connection). Leave DB_DATABASE_1 empty to skip using it.
  mysql_mes:
    image: mysql:8.2
    container_name: athenaerp-mysql-mes
    restart: unless-stopped
    ports:
      - "${FORWARD_DB_PORT_MES:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD_1:-secret}
      MYSQL_DATABASE: ${DB_DATABASE_1:-mes}
      MYSQL_USER: laravel
      MYSQL_PASSWORD: ${DB_PASSWORD_1:-secret}
    volumes:
      - athenaerp-mysql-mes:/var/lib/mysql
      - ./docker/mysql/conf.d/99-performance.cnf:/etc/mysql/conf.d/99-performance.cnf:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\""]
      retries: 10
      interval: 5s
      timeout: 5s
      start_period: 30s
    networks:
      - athenaerp

  redis:
    image: redis:7-alpine
    container_name: athenaerp-redis
    restart: unless-stopped
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - athenaerp-redis:/data
    networks:
      - athenaerp

  mailpit:
    image: axllent/mailpit:latest
    container_name: athenaerp-mailpit
    restart: unless-stopped
    ports:
      - "${FORWARD_MAILPIT_PORT:-1025}:1025"
      - "${FORWARD_MAILPIT_DASHBOARD:-8025}:8025"
    networks:
      - athenaerp

networks:
  athenaerp:
    driver: bridge

volumes:
  athenaerp-mysql:
  athenaerp-mysql-mes:
  athenaerp-redis:
