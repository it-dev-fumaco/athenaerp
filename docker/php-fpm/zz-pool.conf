; PHP-FPM pool overrides for AthenaERP (concurrency; tune if Docker has more RAM)
; FPM will not run as root; use www-data and rely on entrypoint chmod/Redis sessions for writable storage.
[www]
pm = dynamic
pm.max_children = 50
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 35
