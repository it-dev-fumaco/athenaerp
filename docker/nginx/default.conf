# Nginx + PHP-FPM for AthenaERP (performance profile)
# Serves static from public/, forwards PHP to app:9000

server {
    listen 80;
    server_name _;
    root /var/www/html/public;

    index index.php;
    charset utf-8;

    # Static assets: let Nginx serve directly (faster than PHP)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_connect_timeout 60s;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_param PHP_VALUE "upload_max_filesize=100M \n post_max_size=100M";
        # Surface 502 reason when PHP-FPM is down or unreachable
        fastcgi_intercept_errors on;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
