# Nginx + PHP-FPM for AthenaERP (performance profile)
#
# Do NOT use server_name _; for Athena — it does not match athenaerp.local, so requests
# fall through to the wrong default. Keep explicit server_name and default_server on Athena.

# --- AthenaERP ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    # Include both local and staging hostnames.
    server_name athenaerp.local athena-uat.fumaco.local athena.fumaco.net localhost 127.0.0.1;

    root /var/www/html/public;

    index index.php;
    charset utf-8;

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass athenaerp-app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        # Preserve original scheme/host when behind TLS-terminating proxy/load balancer.
        # Edge -> nginx is usually plain HTTP, so Laravel needs X-Forwarded-* to detect HTTPS.
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT  $http_x_forwarded_port;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_connect_timeout 60s;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_param PHP_VALUE "upload_max_filesize=100M \n post_max_size=100M";
        fastcgi_intercept_errors on;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
