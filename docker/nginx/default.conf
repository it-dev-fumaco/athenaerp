# Nginx + PHP-FPM for AthenaERP (performance profile)
#
# Do NOT use server_name _; for Athena — it does not match athenaerp.local, so requests
# fall through to the default_server. Essex had listen [::]:80 without a matching Athena
# block on IPv6, so IPv6 (or default selection) could serve Essex for every host.

# --- AthenaERP ---
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    # Include both local and staging hostnames.
    server_name athenaerp.local athena-uat.fumaco.local localhost 127.0.0.1;

    root /var/www/html/public;

    index index.php;
    charset utf-8;

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # Must be athenaerp-app — not "app" (Essex also registers hostname "app" on the shared Docker network).
        fastcgi_pass athenaerp-app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        # If TLS terminates upstream (external reverse proxy), preserve the original scheme/host for Laravel.
        set $upstream_https off;
        if ($http_x_forwarded_proto = 'https') { set $upstream_https on; }
        fastcgi_param HTTPS $upstream_https;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_connect_timeout 60s;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_param PHP_VALUE "upload_max_filesize=100M \n post_max_size=100M";
        fastcgi_intercept_errors on;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# --- Essex (Laravel) ---
# Static from ESSEX_PATH mount + PHP via essex-app PHP-FPM.
# If `nginx -s reload` fails with "host not found in upstream \"essex-app\"",
# start/reconnect `essex-app` first (or restart nginx after Essex is up).
server {
    listen 80;
    listen [::]:80;
    listen 8080;
    # Include both local and staging hostnames.
    server_name essex.local essex-uat.fumaco.local essex.fumaco.com;

    root /var/www/essex/public;
    index index.php;
    charset utf-8;
    client_max_body_size 64M;

    # Fonts/CSS may be requested cross-origin if old absolute URLs linger; * avoids CORS blocks.
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot|map)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    location /storage/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass essex-app:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        set $upstream_https off;
        if ($http_x_forwarded_proto = 'https') { set $upstream_https on; }
        fastcgi_param HTTPS $upstream_https;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_connect_timeout 60s;
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;
        fastcgi_param HTTP_PROXY "";
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
